<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a56db">
  <meta name="description" content="PayLink — cross-border payments and invoice settlement">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/styles.css">
  <title>PayLink</title>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <span class="logo">PayLink</span>
        <span class="tagline">Payments</span>
      </div>
      <div class="topbar-actions">
        <button id="notificationsBtn" class="ghost hidden" type="button" aria-label="Notifications">
          🔔 <span id="notifBadge" class="notif-badge hidden">0</span>
        </button>
        <button id="logoutBtn" class="ghost hidden" type="button">Log out</button>
      </div>
    </header>

    <main id="main">
      <section id="loginView" class="panel">
        <h1>Sign in</h1>
        <p class="lead">First, message PayLink on WhatsApp and reply <strong>app</strong> to activate. Then sign in here within 24 hours — your login code is sent on WhatsApp.</p>
        <div id="activationNotice" class="notice hidden"></div>
        <form id="loginForm">
          <label for="phone">Mobile number</label>
          <input id="phone" name="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="+26771234567" required>
          <button type="submit" class="primary">Send code</button>
        </form>
        <form id="verifyForm" class="hidden">
          <p class="hint">Enter the 6-digit code we sent to <strong id="verifyPhone"></strong></p>
          <label for="code">Verification code</label>
          <input id="code" name="code" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required>
          <button type="submit" class="primary">Verify &amp; continue</button>
          <button id="backToPhone" type="button" class="link">Use a different number</button>
        </form>
        <p id="loginError" class="error hidden"></p>
      </section>

      <section id="chatView" class="hidden">
        <div id="statusBar" class="status-bar hidden"></div>
        <div id="messages" class="messages" aria-live="polite"></div>
        <div class="chat-footer">
          <div id="quickReplies" class="quick-replies"></div>
          <form id="chatForm" class="composer">
            <label class="sr-only" for="message">Message</label>
            <input id="message" name="message" type="text" autocomplete="off" placeholder="Type a message…">
            <label class="attach-btn" title="Upload document">
              <input id="fileInput" type="file" accept="image/*,.pdf" hidden>
              📎
            </label>
            <button type="submit" class="primary">Send</button>
          </form>
        </div>
        <div id="notificationsPanel" class="notifications-panel hidden" aria-label="Notifications">
          <div class="notifications-head">
            <h2>Notifications</h2>
            <button id="markAllReadBtn" type="button" class="link">Mark all read</button>
          </div>
          <div id="notificationsList" class="notifications-list"></div>
          <p id="notificationsEmpty" class="notifications-empty hidden">No notifications yet.</p>
        </div>
      </section>
    </main>
  </div>
  <script src="/app.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
