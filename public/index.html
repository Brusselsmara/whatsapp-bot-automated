<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2d6a4f">
  <meta name="description" content="PayLink — cross-border payments and invoice settlement">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/styles.css">
  <title>PayLink</title>
</head>
<body>
  <div id="app">
    <section id="loginView" class="login-screen">
      <header class="login-brand">
        <div class="wordmark">Pay<span>Link</span></div>
      </header>
      <div class="login-center">
        <div class="login-card">
          <h1>Sign in</h1>
          <p class="lead">First, message PayLink on WhatsApp and reply <strong>app</strong> to activate. Then sign in here within 24 hours — your login code is sent on WhatsApp.</p>
          <div id="activationNotice" class="notice hidden"></div>
          <form id="loginForm">
            <label for="phone">Mobile number</label>
            <input id="phone" name="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="+26771234567" required>
            <button type="submit" class="primary">Send code</button>
          </form>
          <form id="verifyForm" class="hidden">
            <p class="hint">Enter the 6-digit code we sent to <strong id="verifyPhone"></strong></p>
            <label for="code">Verification code</label>
            <input id="code" name="code" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required>
            <button type="submit" class="primary">Verify &amp; continue</button>
            <button id="backToPhone" type="button" class="link">Use a different number</button>
          </form>
          <p id="loginError" class="error hidden"></p>
        </div>
      </div>
    </section>

    <section id="chatView" class="hidden chat-screen">
      <header class="chat-header">
        <div class="chat-header-left">
          <div class="chat-avatar" aria-hidden="true">P</div>
          <div class="chat-title">
            <div class="name">PayLink Bot</div>
            <div class="subtitle">Cross-border money assistant</div>
          </div>
        </div>
        <div class="chat-header-actions">
          <span class="notif-wrap">
            <button id="notificationsBtn" class="icon-btn hidden" type="button" aria-label="Notifications">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
              </svg>
              <span id="notifBadge" class="notif-badge hidden">0</span>
            </button>
          </span>
          <button id="logoutBtn" class="icon-btn hidden" type="button" aria-label="Log out">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </header>

      <div id="walletStrip" class="wallet-strip hidden" aria-live="polite"></div>

      <div id="notificationsPanel" class="notifications-panel hidden" aria-label="Notifications">
        <div class="notifications-head">
          <h2>Notifications</h2>
          <button id="markAllReadBtn" type="button" class="link">Mark all read</button>
        </div>
        <div id="notificationsList" class="notifications-list"></div>
        <p id="notificationsEmpty" class="notifications-empty hidden">No notifications yet.</p>
      </div>

      <div id="statusBar" class="status-bar hidden"></div>

      <div id="messages" class="messages" aria-live="polite">
        <div id="messagesInner" class="messages-inner"></div>
      </div>

      <div class="chat-footer">
        <div id="quickReplies" class="quick-replies"></div>
        <form id="chatForm" class="composer">
          <label class="sr-only" for="message">Message</label>
          <textarea id="message" name="message" rows="1" autocomplete="off" placeholder="Message PayLink…"></textarea>
          <label class="attach-btn" title="Upload document">
            <input id="fileInput" type="file" accept="image/*,.pdf" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </label>
          <button type="submit" class="send-btn" aria-label="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </form>
      </div>
    </section>
  </div>
  <script src="/app.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
